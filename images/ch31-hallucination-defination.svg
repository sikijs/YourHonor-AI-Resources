<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <!-- Title -->
  <text x="50" y="60" fill="#ffffff" font-size="30" font-family="Arial">
    How AI Hallucination Emerges
  </text>

  <!-- Input Box -->
  <rect x="60" y="140" width="320" height="220" rx="12" fill="#111827" stroke="#38bdf8" stroke-width="2"></rect>
  <text x="90" y="190" fill="#38bdf8" font-size="20" font-family="Arial">User Input</text>
  <text x="90" y="230" fill="#cbd5e1" font-size="16" font-family="Arial">
    "Find a legal case about...
  </text>
  <text x="90" y="260" fill="#cbd5e1" font-size="16" font-family="Arial">
    service contract enforcement"
  </text>

  <!-- Arrow -->
  <line x1="380" y1="250" x2="620" y2="250" stroke="#facc15" stroke-width="4"></line>
  <polygon points="620,250 605,240 605,260" fill="#facc15"></polygon>

  <text x="420" y="230" fill="#facc15" font-size="16" font-family="Arial">
    Pattern Prediction
  </text>

  <!-- Output Box -->
  <rect x="640" y="140" width="320" height="220" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2"></rect>
  <text x="670" y="190" fill="#22c55e" font-size="20" font-family="Arial">AI Output</text>

  <text x="670" y="230" fill="#e2e8f0" font-size="14" font-family="Arial">
    Case: Smith v. Jones (2014)
  </text>
  <text x="670" y="255" fill="#e2e8f0" font-size="14" font-family="Arial">
    Court enforced oral agreement
  </text>
  <text x="670" y="280" fill="#ef4444" font-size="14" font-family="Arial">
    ⚠ Not real / not verifiable
  </text>

  <!-- Bottom Insight -->
  <text x="60" y="440" fill="#94a3b8" font-size="18" font-family="Arial">
    The model predicts language patterns — it does not verify truth.
  </text>
</svg>