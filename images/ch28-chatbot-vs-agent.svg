<svg width="1000" height="500" xmlns="http://www.w3.org/2000/svg">

  <style>
    .box { fill:#f7f9fc; stroke:#2b3a55; stroke-width:2; rx:12; }
    .text { font-family: Arial, sans-serif; font-size:20px; fill:#1c2430; text-anchor:middle; }
    .arrow { stroke:#2b3a55; stroke-width:2; marker-end:url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b3a55"></polygon>
    </marker>
  </defs>

  <!-- Left: Chatbot -->
  <rect x="80" y="200" width="250" height="80" class="box"></rect>
  <text x="205" y="250" class="text">User Prompt</text>

  <line x1="205" y1="280" x2="205" y2="360" class="arrow"></line>

  <rect x="80" y="360" width="250" height="80" class="box"></rect>
  <text x="205" y="410" class="text">Single Response</text>

  <text x="205" y="120" class="text">Chatbot</text>

  <!-- Right: Agent -->
  <rect x="670" y="120" width="250" height="80" class="box"></rect>
  <text x="795" y="170" class="text">Goal</text>

  <line x1="795" y1="200" x2="795" y2="260" class="arrow"></line>

  <rect x="670" y="260" width="250" height="80" class="box"></rect>
  <text x="795" y="310" class="text">Plan + Tools</text>

  <line x1="795" y1="340" x2="795" y2="400" class="arrow"></line>

  <rect x="670" y="400" width="250" height="80" class="box"></rect>
  <text x="795" y="450" class="text">Iterative Output</text>

  <text x="795" y="80" class="text">AI Agent</text>

</svg>