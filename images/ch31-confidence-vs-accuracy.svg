<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420">
  <rect width="100%" height="100%" fill="#0f172a"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="28">Confidence vs Accuracy</text>

  <circle cx="250" cy="220" r="90" fill="#22c55e" opacity="0.3"></circle>
  <text x="190" y="220" fill="#ffffff">High Confidence</text>

  <circle cx="650" cy="220" r="40" fill="#ef4444" opacity="0.6"></circle>
  <text x="600" y="220" fill="#ffffff">Low Accuracy</text>

  <line x1="340" y1="220" x2="600" y2="220" stroke="#facc15" stroke-width="3"></line>
  <text x="360" y="200" fill="#facc15">Mismatch</text>

  <text x="170" y="320" fill="#94a3b8">Sounds right</text>
  <text x="580" y="320" fill="#94a3b8">But is wrong</text>
</svg>