<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30" font-family="Arial">
    Plausibility vs Correctness
  </text>

  <!-- Plausible -->
  <circle cx="300" cy="260" r="120" fill="#22c55e" opacity="0.25"></circle>
  <text x="230" y="260" fill="#22c55e" font-size="18">Sounds Right</text>
  <text x="240" y="290" fill="#cbd5e1" font-size="14">Smooth language</text>

  <!-- Correct -->
  <circle cx="700" cy="260" r="60" fill="#38bdf8" opacity="0.5"></circle>
  <text x="650" y="260" fill="#38bdf8" font-size="18">Actually True</text>
  <text x="660" y="290" fill="#cbd5e1" font-size="14">Verified fact</text>

  <!-- Arrow -->
  <line x1="420" y1="260" x2="640" y2="260" stroke="#facc15" stroke-width="4"></line>
  <polygon points="640,260 625,250 625,270" fill="#facc15"></polygon>

  <text x="430" y="230" fill="#facc15" font-size="16">Can diverge</text>
</svg>