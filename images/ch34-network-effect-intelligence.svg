<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">
<style>
.label { font: 18px sans-serif; }
.title { font: bold 24px sans-serif; }
</style>

<text x="240" y="40" class="title">
Intelligence Emerges From Connections
</text>

<circle cx="150" cy="150" r="20" fill="#d9ecff"></circle>
<circle cx="250" cy="100" r="20" fill="#d9ecff"></circle>
<circle cx="350" cy="170" r="20" fill="#d9ecff"></circle>
<circle cx="220" cy="250" r="20" fill="#d9ecff"></circle>
<circle cx="400" cy="260" r="20" fill="#d9ecff"></circle>
<circle cx="520" cy="180" r="20" fill="#d9ecff"></circle>
<circle cx="650" cy="120" r="20" fill="#d9ecff"></circle>
<circle cx="700" cy="260" r="20" fill="#d9ecff"></circle>

<line x1="150" y1="150" x2="250" y2="100" stroke="black"></line>
<line x1="250" y1="100" x2="350" y2="170" stroke="black"></line>
<line x1="350" y1="170" x2="520" y2="180" stroke="black"></line>
<line x1="220" y1="250" x2="400" y2="260" stroke="black"></line>
<line x1="400" y1="260" x2="520" y2="180" stroke="black"></line>
<line x1="520" y1="180" x2="650" y2="120" stroke="black"></line>
<line x1="520" y1="180" x2="700" y2="260" stroke="black"></line>

<text x="260" y="420" class="label">
Many simple units
</text>

<text x="520" y="420" class="label">
Complex intelligence
</text>
</svg>