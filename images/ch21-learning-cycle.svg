<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box {
      fill: white;
      stroke: black;
      stroke-width: 2;
    }
    .text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 20px;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .arrow {
      stroke: black;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .title {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      font-weight: bold;
      text-anchor: middle;
    }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"></polygon>
    </marker>
  </defs>

  <text x="400" y="40" class="title">The Learning Cycle</text>

  <rect x="250" y="80" width="300" height="50" class="box"></rect>
  <text x="400" y="105" class="text">Input Data</text>

  <line x1="400" y1="130" x2="400" y2="165" class="arrow"></line>

  <rect x="250" y="170" width="300" height="50" class="box"></rect>
  <text x="400" y="195" class="text">Prediction</text>

  <line x1="400" y1="220" x2="400" y2="255" class="arrow"></line>

  <rect x="180" y="260" width="440" height="50" class="box"></rect>
  <text x="400" y="285" class="text">Compare with Correct Answer</text>

  <line x1="400" y1="310" x2="400" y2="345" class="arrow"></line>

  <rect x="250" y="350" width="300" height="50" class="box"></rect>
  <text x="400" y="375" class="text">Measure Error</text>

  <line x1="400" y1="400" x2="400" y2="435" class="arrow"></line>

  <rect x="250" y="440" width="300" height="50" class="box"></rect>
  <text x="400" y="465" class="text">Adjust Weights</text>

  <line x1="400" y1="490" x2="400" y2="525" class="arrow"></line>

  <rect x="250" y="530" width="300" height="50" class="box"></rect>
  <text x="400" y="555" class="text">Better Prediction</text>

  <!-- Feedback Loop -->
  <path d="M 250 555 C 120 555, 120 105, 250 105" class="arrow"></path>

  <text x="115" y="330" font-family="Arial, Helvetica, sans-serif" font-size="18" transform="rotate(-90 115 330)">
        Repeat Many Times
  </text>
</svg>