<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <rect width="1000" height="500" fill="white"></rect>

  <text x="500" y="50" text-anchor="middle" font-family="Georgia" font-size="24" fill="#111">
    Training From Scratch vs Fine-Tuning
  </text>

  <!-- Left side -->
  <rect x="70" y="100" width="330" height="280" rx="12" fill="#fafafa" stroke="#d9d9d9"></rect>

  <text x="235" y="140" text-anchor="middle" font-family="Georgia" font-size="18" fill="#111">
    Training From Scratch
  </text>

  <rect x="160" y="180" width="150" height="70" rx="8" fill="#f2f2f2" stroke="#cfcfcf"></rect>
  <text x="235" y="220" text-anchor="middle" font-family="Georgia" font-size="14">
    Learn Language
  </text>

  <line x1="235" y1="250" x2="235" y2="280" stroke="#888"></line>

  <rect x="160" y="280" width="150" height="70" rx="8" fill="#f2f2f2" stroke="#cfcfcf"></rect>
  <text x="235" y="320" text-anchor="middle" font-family="Georgia" font-size="14">
    Learn Knowledge
  </text>

  <line x1="235" y1="350" x2="235" y2="380" stroke="#888"></line>

  <rect x="160" y="380" width="150" height="70" rx="8" fill="#f2f2f2" stroke="#cfcfcf"></rect>
  <text x="235" y="420" text-anchor="middle" font-family="Georgia" font-size="14">
    Learn Profession
  </text>

  <!-- Right side -->
  <rect x="600" y="100" width="330" height="280" rx="12" fill="#f4f9ff" stroke="#cfe0f5"></rect>

  <text x="765" y="140" text-anchor="middle" font-family="Georgia" font-size="18" fill="#111">
    Fine-Tuning
  </text>

  <rect x="670" y="190" width="190" height="90" rx="8" fill="#e8f2ff" stroke="#bcd1ee"></rect>

  <text x="765" y="225" text-anchor="middle" font-family="Georgia" font-size="14">
    Existing Foundation
  </text>

  <text x="765" y="248" text-anchor="middle" font-family="Georgia" font-size="14">
    Model
  </text>

  <line x1="765" y1="280" x2="765" y2="320" stroke="#888"></line>

  <rect x="670" y="320" width="190" height="70" rx="8" fill="#eef7ee" stroke="#c9e1c9"></rect>

  <text x="765" y="362" text-anchor="middle" font-family="Georgia" font-size="14">
    Add Specialized Knowledge
  </text>

  <!-- Bottom labels -->
  <text x="235" y="480" text-anchor="middle" font-family="Georgia" font-size="13" fill="#555">
    Large cost • Long training • Massive data
  </text>

  <text x="765" y="480" text-anchor="middle" font-family="Georgia" font-size="13" fill="#555">
    Faster • Cheaper • Domain-specific
  </text>
</svg>