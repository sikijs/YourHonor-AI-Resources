<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="1000" height="900" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 30px;
        font-weight: bold;
        text-anchor: middle;
      }

      .subtitle {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: bold;
        text-anchor: middle;
      }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 20px;
      }

      .small {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
      }

      .footer {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 24px;
        font-weight: bold;
        text-anchor: middle;
      }

      .box {
        fill: white;
        stroke: black;
        stroke-width: 2;
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="50" class="title">
    Why Token IDs Cannot Represent Meaning
  </text>

  <!-- Human Understanding Box -->
  <rect x="70" y="90" width="860" height="280" class="box"></rect>

  <text x="500" y="130" class="subtitle">
    Human Understanding
  </text>

  <!-- Cat -->
  <text x="140" y="190" class="label">CAT (1842)</text>

  <!-- Dog -->
  <text x="140" y="250" class="label">DOG (935)</text>

  <!-- Similar animals label -->
  <line x1="290" y1="185" x2="420" y2="220" stroke="black" stroke-width="2"></line>
  <line x1="290" y1="245" x2="420" y2="220" stroke="black" stroke-width="2"></line>

  <text x="450" y="225" class="label">
    Similar Animals
  </text>

  <!-- Airplane -->
  <text x="140" y="320" class="label">
    AIRPLANE (7611)
  </text>

  <line x1="340" y1="315" x2="470" y2="315" stroke="black" stroke-width="2"></line>

  <text x="500" y="322" class="label">
    Different Concept
  </text>

  <!-- VS -->
  <text x="500" y="445" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" text-anchor="middle">
    VS
  </text>

  <!-- Computer Box -->
  <rect x="70" y="500" width="860" height="260" class="box"></rect>

  <text x="500" y="540" class="subtitle">
    Computer Sees Only IDs
  </text>

  <text x="500" y="610" font-family="Courier New, monospace" font-size="28" text-anchor="middle">
    1842
  </text>

  <text x="500" y="650" font-family="Courier New, monospace" font-size="28" text-anchor="middle">
    935
  </text>

  <text x="500" y="690" font-family="Courier New, monospace" font-size="28" text-anchor="middle">
    7611
  </text>

  <text x="500" y="730" class="label" text-anchor="middle">
    Just Numbers
  </text>

  <!-- Footer -->
  <text x="500" y="830" class="footer">
    Problem: Token IDs are labels, not meaning.
  </text>

</svg>