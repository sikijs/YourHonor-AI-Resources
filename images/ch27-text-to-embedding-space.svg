<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="420" fill="#ffffff"></rect>

  <text x="500" y="40" text-anchor="middle" font-size="18">Text to Semantic Embedding Space</text>

  <!-- Text side -->
  <rect x="80" y="140" width="260" height="120" rx="12" fill="#f5f5f5" stroke="#333"></rect>
  <text x="210" y="175" text-anchor="middle" font-size="14">Raw Text</text>
  <text x="210" y="205" text-anchor="middle" font-size="12">“negligence in driving”</text>
  <text x="210" y="230" text-anchor="middle" font-size="12">“autonomous liability”</text>

  <!-- Arrow -->
  <line x1="340" y1="200" x2="420" y2="200" stroke="#333" stroke-width="2"></line>
  <text x="380" y="185" text-anchor="middle" font-size="12">Embedding Model</text>

  <!-- Vector space -->
  <rect x="450" y="90" width="460" height="260" rx="12" fill="#e8f4ff" stroke="#333"></rect>
  <text x="680" y="120" text-anchor="middle" font-size="14">High-Dimensional Vector Space</text>

  <!-- Points -->
  <circle cx="560" cy="180" r="6" fill="#333"></circle>
  <circle cx="590" cy="200" r="6" fill="#333"></circle>
  <circle cx="620" cy="220" r="6" fill="#333"></circle>

  <circle cx="720" cy="210" r="6" fill="#2d6a4f"></circle>
  <circle cx="750" cy="230" r="6" fill="#2d6a4f"></circle>
  <circle cx="780" cy="250" r="6" fill="#2d6a4f"></circle>

  <text x="650" y="310" text-anchor="middle" font-size="12">Similar meanings cluster together</text>
</svg>