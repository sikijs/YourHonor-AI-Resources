<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30" font-family="Arial">
    Specificity Stress Test
  </text>

  <!-- General Answer -->
  <rect x="60" y="140" width="380" height="260" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="90" y="190" fill="#38bdf8" font-size="20">Initial Response</text>

  <text x="90" y="240" fill="#e2e8f0" font-size="14">General legal explanation</text>
  <text x="90" y="270" fill="#e2e8f0" font-size="14">No specific case details</text>
  <text x="90" y="300" fill="#e2e8f0" font-size="14">Smooth and confident</text>

  <!-- Arrow -->
  <line x1="440" y1="270" x2="580" y2="270" stroke="#facc15" stroke-width="4"></line>
  <polygon points="580,270 565,260 565,280" fill="#facc15"></polygon>

  <text x="450" y="240" fill="#facc15" font-size="14">Stress Test</text>

  <!-- Breakdown -->
  <rect x="600" y="140" width="340" height="260" rx="12" fill="#111827" stroke="#ef4444"></rect>
  <text x="630" y="190" fill="#ef4444" font-size="20">After Probing</text>

  <text x="630" y="240" fill="#e2e8f0" font-size="14">Missing case number</text>
  <text x="630" y="270" fill="#e2e8f0" font-size="14">Uncertain jurisdiction</text>
  <text x="630" y="300" fill="#ef4444" font-size="14">Confidence drops</text>

</svg>