<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380">
  <rect width="100%" height="100%" fill="white"></rect>

  <text x="50%" y="60" text-anchor="middle" font-size="22" font-family="Georgia" fill="#111">
    How Learning Changes
  </text>

  <!-- Left -->
  <rect x="100" y="110" width="340" height="210" rx="12" fill="#fafafa" stroke="#ddd"></rect>
  <text x="130" y="150" font-size="18" font-family="Georgia" fill="#111">Pretraining</text>

  <text x="130" y="185" font-size="14" font-family="Georgia" fill="#444">• Reads all driving manuals</text>
  <text x="130" y="210" font-size="14" font-family="Georgia" fill="#444">• Learns theory &amp; rules</text>
  <text x="130" y="235" font-size="14" font-family="Georgia" fill="#444">• No real-world specialization</text>

  <!-- Right -->
  <rect x="560" y="110" width="340" height="210" rx="12" fill="#f0fff4" stroke="#cdebd6"></rect>
  <text x="590" y="150" font-size="18" font-family="Georgia" fill="#111">Fine-Tuning</text>

  <text x="590" y="185" font-size="14" font-family="Georgia" fill="#444">• Practices in real environments</text>
  <text x="590" y="210" font-size="14" font-family="Georgia" fill="#444">• Learns contextual patterns</text>
  <text x="590" y="235" font-size="14" font-family="Georgia" fill="#444">• Gains domain reliability</text>

  <!-- Connector -->
  <line x1="440" y1="215" x2="560" y2="215" stroke="#999" stroke-width="2"></line>
  <circle cx="440" cy="215" r="4" fill="#999"></circle>
  <circle cx="560" cy="215" r="4" fill="#999"></circle>
</svg>