<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360">
  <rect width="100%" height="100%" fill="white"></rect>

  <text x="50%" y="60" text-anchor="middle" font-size="22" font-family="Georgia" fill="#111">
    How Fine-Tuning Adjusts Behavior
  </text>

  <!-- Before -->
  <rect x="100" y="110" width="340" height="190" rx="12" fill="#f7f7f7" stroke="#ddd"></rect>
  <text x="130" y="150" font-size="18" font-family="Georgia" fill="#111">Before</text>

  <text x="130" y="185" font-size="14" font-family="Georgia" fill="#444">• General patterns</text>
  <text x="130" y="210" font-size="14" font-family="Georgia" fill="#444">• Mixed domain outputs</text>
  <text x="130" y="235" font-size="14" font-family="Georgia" fill="#444">• Variable consistency</text>

  <!-- After -->
  <rect x="560" y="110" width="340" height="190" rx="12" fill="#eef6ff" stroke="#cfe3ff"></rect>
  <text x="590" y="150" font-size="18" font-family="Georgia" fill="#111">After Fine-Tuning</text>

  <text x="590" y="185" font-size="14" font-family="Georgia" fill="#444">• Domain-specific behavior</text>
  <text x="590" y="210" font-size="14" font-family="Georgia" fill="#444">• Consistent outputs</text>
  <text x="590" y="235" font-size="14" font-family="Georgia" fill="#444">• Better alignment</text>

  <!-- Connector -->
  <line x1="440" y1="205" x2="560" y2="205" stroke="#999" stroke-width="2"></line>
  <circle cx="440" cy="205" r="4" fill="#999"></circle>
  <circle cx="560" cy="205" r="4" fill="#999"></circle>
</svg>