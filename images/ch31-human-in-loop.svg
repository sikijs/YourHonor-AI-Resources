<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30">Human-in-the-Loop System</text>

  <!-- AI -->
  <rect x="120" y="220" width="200" height="140" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="180" y="270" fill="#38bdf8">AI</text>

  <!-- Human -->
  <rect x="420" y="220" width="200" height="140" rx="12" fill="#111827" stroke="#22c55e"></rect>
  <text x="470" y="270" fill="#22c55e">Human</text>

  <!-- System -->
  <rect x="720" y="220" width="200" height="140" rx="12" fill="#111827" stroke="#a855f7"></rect>
  <text x="780" y="270" fill="#a855f7">System</text>

  <!-- Flow -->
  <line x1="320" y1="290" x2="420" y2="290" stroke="#facc15" stroke-width="3"></line>
  <line x1="620" y1="290" x2="720" y2="290" stroke="#facc15" stroke-width="3"></line>

  <text x="150" y="420" fill="#94a3b8">Generate → Verify → Record</text>
</svg>