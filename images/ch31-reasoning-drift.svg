<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30" font-family="Arial">
    Reasoning Drift (Step-by-Step Deviation)
  </text>

  <!-- Step boxes -->
  <rect x="80" y="180" width="160" height="100" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="120" y="230" fill="#38bdf8" font-size="14">Step 1</text>
  <text x="105" y="255" fill="#cbd5e1" font-size="12">Correct premise</text>

  <rect x="280" y="180" width="160" height="100" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="320" y="230" fill="#38bdf8" font-size="14">Step 2</text>
  <text x="300" y="255" fill="#cbd5e1" font-size="12">Logical continuation</text>

  <rect x="480" y="180" width="160" height="100" rx="12" fill="#111827" stroke="#facc15"></rect>
  <text x="520" y="230" fill="#facc15" font-size="14">Step 3</text>
  <text x="495" y="255" fill="#cbd5e1" font-size="12">Subtle shift begins</text>

  <rect x="680" y="180" width="160" height="100" rx="12" fill="#111827" stroke="#ef4444"></rect>
  <text x="720" y="230" fill="#ef4444" font-size="14">Step 4</text>
  <text x="690" y="255" fill="#cbd5e1" font-size="12">Incorrect conclusion</text>

  <!-- Path line -->
  <path d="M160 300 L360 300 L560 300 L760 300" stroke="#facc15" stroke-width="4" fill="none"></path>

  <!-- Drift indicator -->
  <circle cx="560" cy="300" r="10" fill="#ef4444"></circle>
  <text x="520" y="340" fill="#ef4444" font-size="14">Drift point</text>

</svg>