<svg width="1100" height="500" xmlns="http://www.w3.org/2000/svg">
<style>
.box{fill:#f7f9fc;stroke:#2b3a55;stroke-width:2}
.txt{font-family:Arial;font-size:18px;text-anchor:middle}
.arrow{stroke:#2b3a55;stroke-width:2;marker-end:url(#a)}
</style>

<defs>
<marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0,10 3.5,0 7" fill="#2b3a55"></polygon>
</marker>
</defs>

<rect x="80" y="200" width="180" height="70" class="box"></rect>
<text x="170" y="240" class="txt">Day 1</text>

<rect x="450" y="200" width="180" height="70" class="box"></rect>
<text x="540" y="240" class="txt">Day 30</text>

<rect x="820" y="200" width="180" height="70" class="box"></rect>
<text x="910" y="240" class="txt">Day 180</text>

<line x1="260" y1="235" x2="450" y2="235" class="arrow"></line>
<line x1="630" y1="235" x2="820" y2="235" class="arrow"></line>

<text x="540" y="120" class="txt">Persistent Memory Retained Across Time</text>
</svg>