<svg width="900" height="900" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">

  <style>
    .box { fill:#f7f9fc; stroke:#2b3a55; stroke-width:2; rx:12; }
    .text { font-family: Arial, sans-serif; font-size:20px; fill:#1c2430; text-anchor:middle; }
    .arrow { stroke:#2b3a55; stroke-width:2; marker-end:url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b3a55"></polygon>
    </marker>
  </defs>

  <!-- Boxes -->
  <rect x="350" y="80" width="200" height="70" class="box"></rect>
  <text x="450" y="125" class="text">Goal</text>

  <rect x="350" y="200" width="200" height="70" class="box"></rect>
  <text x="450" y="245" class="text">Plan</text>

  <rect x="350" y="320" width="200" height="70" class="box"></rect>
  <text x="450" y="365" class="text">Action</text>

  <rect x="350" y="440" width="200" height="70" class="box"></rect>
  <text x="450" y="485" class="text">Observation</text>

  <rect x="350" y="560" width="200" height="70" class="box"></rect>
  <text x="450" y="605" class="text">Update</text>

  <rect x="350" y="680" width="200" height="70" class="box"></rect>
  <text x="450" y="725" class="text">Repeat</text>

  <!-- Arrows -->
  <line x1="450" y1="150" x2="450" y2="200" class="arrow"></line>
  <line x1="450" y1="270" x2="450" y2="320" class="arrow"></line>
  <line x1="450" y1="390" x2="450" y2="440" class="arrow"></line>
  <line x1="450" y1="510" x2="450" y2="560" class="arrow"></line>
  <line x1="450" y1="630" x2="450" y2="680" class="arrow"></line>

  <!-- Loop back -->
  <path d="M450 750 C450 820, 200 820, 200 450 C200 120, 350 120, 350 120" fill="none" class="arrow"></path>

</svg>