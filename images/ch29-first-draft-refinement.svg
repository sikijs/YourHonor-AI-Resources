<svg width="1000" height="450" xmlns="http://www.w3.org/2000/svg">

<rect width="100%" height="100%" fill="white"></rect>

<text x="500" y="50" text-anchor="middle" font-size="28" font-family="Arial" font-weight="bold">
From First Draft to Refined Solution
</text>

<rect x="80" y="170" width="180" height="90" fill="#f8d7da" stroke="#721c24" stroke-width="2"></rect>
<text x="170" y="225" text-anchor="middle" font-size="20">Initial Prompt</text>

<line x1="260" y1="215" x2="390" y2="215" stroke="#555" stroke-width="3"></line>
<polygon points="390,215 370,205 370,225" fill="#555"></polygon>

<rect x="390" y="170" width="180" height="90" fill="#fff3cd" stroke="#856404" stroke-width="2"></rect>
<text x="480" y="225" text-anchor="middle" font-size="20">First Version</text>

<line x1="570" y1="215" x2="700" y2="215" stroke="#555" stroke-width="3"></line>
<polygon points="700,215 680,205 680,225" fill="#555"></polygon>

<rect x="700" y="170" width="180" height="90" fill="#d4edda" stroke="#155724" stroke-width="2"></rect>
<text x="790" y="225" text-anchor="middle" font-size="20">Refined Result</text>

<text x="480" y="320" text-anchor="middle" font-size="18">
Feedback and iteration improve the solution
</text>

</svg>