<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="400" fill="white"/>
<text x="50" y="50" font-size="20">Plausibility vs Truth Risk</text>

<circle cx="200" cy="200" r="60" fill="lightgreen"/>
<text x="160" y="205" font-size="12">Looks Correct</text>

<circle cx="450" cy="200" r="60" fill="red" opacity="0.4"/>
<text x="410" y="205" font-size="12">Actually Wrong</text>

<line x1="260" y1="200" x2="390" y2="200" stroke="black" stroke-dasharray="5,5"/>
</svg>