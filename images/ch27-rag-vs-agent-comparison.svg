<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="420" fill="#ffffff"></rect>

  <text x="500" y="40" text-anchor="middle" font-size="18">RAG vs Agent-Based Systems</text>

  <!-- RAG -->
  <rect x="100" y="120" width="340" height="240" rx="12" fill="#e8f4ff" stroke="#333"></rect>
  <text x="270" y="150" text-anchor="middle" font-size="14">RAG System</text>

  <rect x="140" y="190" width="260" height="60" rx="10" fill="#ffffff" stroke="#333"></rect>
  <text x="270" y="225" text-anchor="middle" font-size="12">Retrieve Documents</text>

  <rect x="140" y="270" width="260" height="60" rx="10" fill="#f0fff4" stroke="#333"></rect>
  <text x="270" y="305" text-anchor="middle" font-size="12">Generate Answer</text>

  <!-- Agent -->
  <rect x="560" y="120" width="340" height="240" rx="12" fill="#fff4e6" stroke="#333"></rect>
  <text x="730" y="150" text-anchor="middle" font-size="14">Agent System</text>

  <rect x="600" y="180" width="260" height="45" rx="10" fill="#ffffff" stroke="#333"></rect>
  <text x="730" y="208" text-anchor="middle" font-size="12">Plan Task</text>

  <rect x="600" y="235" width="260" height="45" rx="10" fill="#e8f4ff" stroke="#333"></rect>
  <text x="730" y="263" text-anchor="middle" font-size="12">Use Tools / Retrieve</text>

  <rect x="600" y="290" width="260" height="45" rx="10" fill="#f0fff4" stroke="#333"></rect>
  <text x="730" y="318" text-anchor="middle" font-size="12">Iterate &amp; Refine</text>

  <!-- Divider -->
  <line x1="500" y1="100" x2="500" y2="360" stroke="#ccc"></line>
</svg>