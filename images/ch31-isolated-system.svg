<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30" font-family="Arial">
    Isolated Generation System
  </text>

  <!-- Model -->
  <rect x="360" y="150" width="280" height="220" rx="12" fill="#111827" stroke="#a855f7"></rect>
  <text x="430" y="200" fill="#a855f7" font-size="20">AI Model</text>

  <text x="395" y="240" fill="#e2e8f0" font-size="14">No external lookup</text>
  <text x="395" y="270" fill="#e2e8f0" font-size="14">Pattern-based generation</text>
  <text x="395" y="300" fill="#e2e8f0" font-size="14">No truth verification</text>

  <!-- Input -->
  <rect x="80" y="200" width="200" height="120" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="130" y="240" fill="#38bdf8">User Prompt</text>

  <line x1="280" y1="260" x2="360" y2="260" stroke="#facc15" stroke-width="4"></line>
  <polygon points="360,260 345,250 345,270" fill="#facc15"></polygon>

  <!-- Output -->
  <rect x="720" y="200" width="200" height="120" rx="12" fill="#111827" stroke="#22c55e"></rect>
  <text x="770" y="240" fill="#22c55e">AI Output</text>

  <line x1="640" y1="260" x2="720" y2="260" stroke="#facc15" stroke-width="4"></line>
  <polygon points="720,260 705,250 705,270" fill="#facc15"></polygon>

</svg>