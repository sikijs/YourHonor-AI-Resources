<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">

  <rect width="900" height="500" fill="white"></rect>

  <text x="450" y="50" text-anchor="middle" font-size="28" font-family="Arial" font-weight="bold">
    Different Inputs, Same Language
  </text>

  <rect x="80" y="120" width="180" height="80" fill="#f5f5f5" stroke="#444"></rect>

  <text x="170" y="165" text-anchor="middle" font-size="24" font-family="Arial">
    Text
  </text>

  <rect x="360" y="120" width="180" height="80" fill="#e8f4ff" stroke="#2c5aa0"></rect>

  <text x="450" y="165" text-anchor="middle" font-size="24" font-family="Arial">
    Numbers
  </text>

  <rect x="640" y="120" width="180" height="80" fill="#f5f5f5" stroke="#444"></rect>

  <text x="730" y="165" text-anchor="middle" font-size="24" font-family="Arial">
    Images
  </text>

  <rect x="360" y="300" width="180" height="80" fill="#e8f4ff" stroke="#2c5aa0"></rect>

  <text x="450" y="345" text-anchor="middle" font-size="24" font-family="Arial">
    AI Model
  </text>

  <rect x="80" y="300" width="180" height="80" fill="#f5f5f5" stroke="#444"></rect>

  <text x="170" y="345" text-anchor="middle" font-size="24" font-family="Arial">
    Audio
  </text>

  <rect x="640" y="300" width="180" height="80" fill="#f5f5f5" stroke="#444"></rect>

  <text x="730" y="345" text-anchor="middle" font-size="24" font-family="Arial">
    Video
  </text>

  <line x1="260" y1="160" x2="360" y2="160" stroke="#333" stroke-width="3"></line>

  <line x1="640" y1="160" x2="540" y2="160" stroke="#333" stroke-width="3"></line>

  <line x1="170" y1="300" x2="360" y2="200" stroke="#333" stroke-width="3"></line>

  <line x1="730" y1="300" x2="540" y2="200" stroke="#333" stroke-width="3"></line>

  <line x1="450" y1="200" x2="450" y2="300" stroke="#333" stroke-width="3"></line>

</svg>