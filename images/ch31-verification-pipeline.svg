<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30">Verification Pipeline</text>

  <rect x="80" y="180" width="180" height="120" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="120" y="240" fill="#38bdf8">Generate</text>

  <rect x="300" y="180" width="180" height="120" rx="12" fill="#111827" stroke="#facc15"></rect>
  <text x="330" y="240" fill="#facc15">Extract Claims</text>

  <rect x="520" y="180" width="180" height="120" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="560" y="240" fill="#38bdf8">Validate</text>

  <rect x="740" y="180" width="180" height="120" rx="12" fill="#111827" stroke="#22c55e"></rect>
  <text x="790" y="240" fill="#22c55e">Decide</text>

  <line x1="260" y1="240" x2="300" y2="240" stroke="#facc15" stroke-width="3"></line>
  <line x1="480" y1="240" x2="520" y2="240" stroke="#facc15" stroke-width="3"></line>
  <line x1="700" y1="240" x2="740" y2="240" stroke="#facc15" stroke-width="3"></line>
</svg>