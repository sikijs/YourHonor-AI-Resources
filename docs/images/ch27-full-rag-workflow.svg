<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="420" fill="#ffffff"></rect>

  <text x="500" y="40" text-anchor="middle" font-size="18">Full RAG System Workflow</text>

  <!-- Steps -->
  <rect x="60" y="140" width="160" height="80" rx="12" fill="#f5f5f5" stroke="#333"></rect>
  <text x="140" y="185" text-anchor="middle">Query</text>

  <rect x="240" y="140" width="160" height="80" rx="12" fill="#fff4e6" stroke="#333"></rect>
  <text x="320" y="185" text-anchor="middle">Embedding</text>

  <rect x="420" y="140" width="160" height="80" rx="12" fill="#e8f4ff" stroke="#333"></rect>
  <text x="500" y="185" text-anchor="middle">Vector Search</text>

  <rect x="600" y="140" width="160" height="80" rx="12" fill="#f0fff4" stroke="#333"></rect>
  <text x="680" y="185" text-anchor="middle">Retrieval</text>

  <rect x="780" y="140" width="160" height="80" rx="12" fill="#dff6ff" stroke="#333"></rect>
  <text x="860" y="185" text-anchor="middle">LLM Answer</text>

  <!-- Arrows -->
  <line x1="220" y1="180" x2="240" y2="180" stroke="#333"></line>
  <line x1="400" y1="180" x2="420" y2="180" stroke="#333"></line>
  <line x1="580" y1="180" x2="600" y2="180" stroke="#333"></line>
  <line x1="760" y1="180" x2="780" y2="180" stroke="#333"></line>

  <text x="500" y="320" text-anchor="middle" font-size="12">Each step progressively grounds the model in external knowledge</text>
</svg>