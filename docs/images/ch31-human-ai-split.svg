<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30">Human–AI Role Separation</text>

  <!-- AI -->
  <rect x="120" y="180" width="300" height="220" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="240" y="230" fill="#38bdf8" font-size="18">AI System</text>
  <text x="160" y="270" fill="#cbd5e1" font-size="14">Fast generation</text>
  <text x="160" y="300" fill="#cbd5e1" font-size="14">Pattern-based output</text>
  <text x="160" y="330" fill="#cbd5e1" font-size="14">No truth guarantee</text>

  <!-- Human -->
  <rect x="580" y="180" width="300" height="220" rx="12" fill="#111827" stroke="#22c55e"></rect>
  <text x="690" y="230" fill="#22c55e" font-size="18">Human</text>
  <text x="620" y="270" fill="#cbd5e1" font-size="14">Verification</text>
  <text x="620" y="300" fill="#cbd5e1" font-size="14">Context judgment</text>
  <text x="620" y="330" fill="#cbd5e1" font-size="14">Final responsibility</text>

  <!-- Arrow -->
  <line x1="420" y1="290" x2="580" y2="290" stroke="#facc15" stroke-width="4"></line>
</svg>