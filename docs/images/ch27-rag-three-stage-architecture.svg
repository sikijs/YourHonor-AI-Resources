<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="420" fill="#ffffff"></rect>

  <text x="500" y="40" text-anchor="middle" font-size="18">RAG Architecture Pipeline</text>

  <!-- Retrieval -->
  <rect x="120" y="140" width="220" height="120" rx="12" fill="#e8f4ff" stroke="#333"></rect>
  <text x="230" y="170" text-anchor="middle" font-size="14">1. Retrieval</text>
  <text x="230" y="200" text-anchor="middle" font-size="12">Search documents</text>
  <text x="230" y="220" text-anchor="middle" font-size="12">Vector DB / Index</text>

  <!-- Augmentation -->
  <rect x="390" y="140" width="220" height="120" rx="12" fill="#fff4e6" stroke="#333"></rect>
  <text x="500" y="170" text-anchor="middle" font-size="14">2. Augmentation</text>
  <text x="500" y="200" text-anchor="middle" font-size="12">Inject context</text>
  <text x="500" y="220" text-anchor="middle" font-size="12">Into prompt</text>

  <!-- Generation -->
  <rect x="660" y="140" width="220" height="120" rx="12" fill="#f0fff4" stroke="#333"></rect>
  <text x="770" y="170" text-anchor="middle" font-size="14">3. Generation</text>
  <text x="770" y="200" text-anchor="middle" font-size="12">Answer grounded</text>
  <text x="770" y="220" text-anchor="middle" font-size="12">in retrieved data</text>

  <!-- Arrows -->
  <line x1="340" y1="200" x2="390" y2="200" stroke="#333"></line>
  <line x1="610" y1="200" x2="660" y2="200" stroke="#333"></line>
</svg>