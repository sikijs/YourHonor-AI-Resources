<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30" font-family="Arial">
    Trust Illusion Loop
  </text>

  <!-- AI Output -->
  <rect x="120" y="180" width="240" height="180" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="180" y="230" fill="#38bdf8" font-size="18">AI Output</text>
  <text x="150" y="270" fill="#cbd5e1" font-size="14">Fluent language</text>
  <text x="150" y="295" fill="#cbd5e1" font-size="14">Structured reasoning</text>
  <text x="150" y="320" fill="#cbd5e1" font-size="14">Confident tone</text>

  <!-- Human Perception -->
  <rect x="640" y="180" width="240" height="180" rx="12" fill="#111827" stroke="#22c55e"></rect>
  <text x="680" y="230" fill="#22c55e" font-size="18">Human Perception</text>
  <text x="670" y="270" fill="#cbd5e1" font-size="14">Feels correct</text>
  <text x="670" y="295" fill="#cbd5e1" font-size="14">Feels authoritative</text>
  <text x="670" y="320" fill="#cbd5e1" font-size="14">Trust is triggered</text>

  <!-- Loop arrows -->
  <path d="M360 250 C 470 120, 570 120, 640 250" stroke="#facc15" stroke-width="4" fill="none"></path>
  <path d="M640 300 C 550 420, 450 420, 360 300" stroke="#facc15" stroke-width="4" fill="none"></path>

  <!-- Warning center -->
  <circle cx="500" cy="280" r="40" fill="#ef4444" opacity="0.9"></circle>
  <text x="465" y="285" fill="#ffffff" font-size="14">No truth check</text>

  <!-- Bottom insight -->
  <text x="50" y="500" fill="#94a3b8" font-size="18" font-family="Arial">
    Fluent output creates perceived authority even without verification.
  </text>
</svg>