<svg width="1000" height="500" xmlns="http://www.w3.org/2000/svg">

<style>
.box { fill:#f7f9fc; stroke:#2b3a55; stroke-width:2; rx:12; }
.text { font-family: Arial, sans-serif; font-size:18px; fill:#1c2430; text-anchor:middle; }
.arrow { stroke:#2b3a55; stroke-width:2; marker-end:url(#arrow); }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#2b3a55"></polygon>
</marker>
</defs>

<!-- Plan side -->
<text x="250" y="60" class="text">Planning</text>

<rect x="120" y="120" width="260" height="70" class="box"></rect>
<text x="250" y="165" class="text">Goal Understanding</text>

<rect x="120" y="220" width="260" height="70" class="box"></rect>
<text x="250" y="265" class="text">Strategy Formation</text>

<line x1="250" y1="190" x2="250" y2="220" class="arrow"></line>

<!-- Execution side -->
<text x="750" y="60" class="text">Execution</text>

<rect x="620" y="120" width="260" height="70" class="box"></rect>
<text x="750" y="165" class="text">Take Action</text>

<rect x="620" y="220" width="260" height="70" class="box"></rect>
<text x="750" y="265" class="text">Use Tools</text>

<rect x="620" y="320" width="260" height="70" class="box"></rect>
<text x="750" y="365" class="text">Refine Output</text>

<line x1="750" y1="190" x2="750" y2="220" class="arrow"></line>
<line x1="750" y1="290" x2="750" y2="320" class="arrow"></line>

<!-- Bridge -->
<line x1="380" y1="250" x2="620" y2="250" class="arrow"></line>

</svg>