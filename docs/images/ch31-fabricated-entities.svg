<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30">Fabricated Entities</text>

  <!-- Prompt -->
  <rect x="80" y="160" width="300" height="220" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="110" y="200" fill="#38bdf8">User Prompt</text>
  <text x="110" y="240" fill="#cbd5e1">“Give me case law...”</text>

  <!-- Output -->
  <rect x="620" y="160" width="300" height="220" rx="12" fill="#111827" stroke="#22c55e"></rect>
