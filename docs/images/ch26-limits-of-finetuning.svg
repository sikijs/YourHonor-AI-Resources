<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <rect width="1000" height="500" fill="white"></rect>

  <text x="500" y="50" text-anchor="middle" font-family="Georgia" font-size="24" fill="#111">
    The Limits of Fine-Tuning
  </text>

  <!-- Center -->
  <circle cx="500" cy="250" r="90" fill="#eef6ff" stroke="#cfe0f5"></circle>

  <text x="500" y="255" text-anchor="middle" font-family="Georgia" font-size="18">
    Fine-Tuning
  </text>

  <!-- Surrounding limitations -->
  <rect x="90" y="110" width="220" height="70" rx="10" fill="#fafafa" stroke="#d9d9d9"></rect>
  <text x="200" y="152" text-anchor="middle" font-family="Georgia" font-size="14">
    Knowledge Gets Outdated
  </text>

  <rect x="690" y="110" width="220" height="70" rx="10" fill="#fafafa" stroke="#d9d9d9"></rect>
  <text x="800" y="152" text-anchor="middle" font-family="Georgia" font-size="14">
    Updates Require Retraining
  </text>

  <rect x="90" y="330" width="220" height="70" rx="10" fill="#fafafa" stroke="#d9d9d9"></rect>
  <text x="200" y="372" text-anchor="middle" font-family="Georgia" font-size="14">
    Mistakes Still Occur
  </text>

  <rect x="690" y="330" width="220" height="70" rx="10" fill="#fafafa" stroke="#d9d9d9"></rect>
  <text x="800" y="372" text-anchor="middle" font-family="Georgia" font-size="14">
    Over-Specialization
  </text>

  <line x1="430" y1="210" x2="310" y2="160" stroke="#888"></line>
  <line x1="570" y1="210" x2="690" y2="160" stroke="#888"></line>
  <line x1="430" y1="290" x2="310" y2="350" stroke="#888"></line>
  <line x1="570" y1="290" x2="690" y2="350" stroke="#888"></line>
</svg>