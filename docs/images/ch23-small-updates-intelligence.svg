<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font: bold 28px Arial, sans-serif; fill: #222; }
.text { font: 18px Arial, sans-serif; fill: #333; }
.small { font: 16px Arial, sans-serif; fill: #555; }
.box { fill: #ffffff; stroke: #444; stroke-width: 2; rx: 12; ry: 12; }
.arrow { stroke: #666; stroke-width: 3; fill: none; marker-end: url(#arrow); }
.dot { fill: #888; }
.highlight { fill: #f5f5f5; stroke: #333; stroke-width: 2; rx: 12; ry: 12; }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0,10 3,0 6" fill="#666"></polygon>
</marker>
</defs>

<text x="500" y="40" text-anchor="middle" class="title">
From Small Adjustments to Intelligence
</text>

<!-- LEFT: small updates -->
<rect x="80" y="120" width="300" height="420" class="box"></rect>
<text x="230" y="160" text-anchor="middle" class="text">Tiny Weight Updates</text>

<circle cx="230" cy="220" r="6" class="dot"></circle>
<circle cx="230" cy="260" r="6" class="dot"></circle>
<circle cx="230" cy="300" r="6" class="dot"></circle>
<circle cx="230" cy="340" r="6" class="dot"></circle>
<circle cx="230" cy="380" r="6" class="dot"></circle>
<circle cx="230" cy="420" r="6" class="dot"></circle>
<circle cx="230" cy="460" r="6" class="dot"></circle>

<text x="230" y="520" text-anchor="middle" class="small">
Each update is small
</text>

<!-- RIGHT: intelligence emerges -->
<rect x="620" y="120" width="300" height="420" class="highlight"></rect>
<text x="770" y="160" text-anchor="middle" class="text">Emergent Intelligence</text>

<!-- pattern icon -->
<circle cx="700" cy="250" r="10" class="dot"></circle>
<circle cx="740" cy="270" r="10" class="dot"></circle>
<circle cx="780" cy="250" r="10" class="dot"></circle>
<circle cx="820" cy="270" r="10" class="dot"></circle>
<circle cx="860" cy="250" r="10" class="dot"></circle>

<circle cx="720" cy="330" r="10" class="dot"></circle>
<circle cx="760" cy="350" r="10" class="dot"></circle>
<circle cx="800" cy="330" r="10" class="dot"></circle>
<circle cx="840" cy="350" r="10" class="dot"></circle>

<text x="770" y="410" text-anchor="middle" class="text">
Patterns appear over time
</text>

<text x="770" y="450" text-anchor="middle" class="small">
Not stored in one place
</text>

<text x="770" y="480" text-anchor="middle" class="small">
But distributed across the network
</text>

<!-- arrows -->
<line x1="380" y1="320" x2="620" y2="320" class="arrow"></line>
<text x="500" y="300" text-anchor="middle" class="small">
Repeated updates
</text>

<!-- bottom flow -->
<rect x="300" y="570" width="400" height="50" class="box"></rect>
<text x="500" y="602" text-anchor="middle" class="text">
Many small corrections → Large behavioral change
</text>

</svg>