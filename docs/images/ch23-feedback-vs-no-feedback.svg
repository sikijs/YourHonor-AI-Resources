<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"></polygon>
    </marker>
  </defs>

  <style>
    .title { font: bold 28px Arial, sans-serif; fill: #222; }
    .heading { font: bold 22px Arial, sans-serif; fill: #333; }
    .text { font: 18px Arial, sans-serif; fill: #444; }
    .small { font: 16px Arial, sans-serif; fill: #555; }
    .player { stroke: #222; stroke-width: 4; fill: none; }
    .ball { fill: white; stroke: #444; stroke-width: 2; }
    .path { stroke: #888; stroke-width: 2; fill: none; stroke-dasharray: 6 4; }
    .basket { stroke: #444; stroke-width: 3; fill: none; }
    .feedback { fill: #f7f7f7; stroke: #999; stroke-width: 2; }
    .arrow { stroke: #666; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  </style>

  <text x="500" y="40" text-anchor="middle" class="title">
    Learning Without Feedback vs Learning With Feedback
  </text>

  <line x1="500" y1="70" x2="500" y2="610" stroke="#d0d0d0" stroke-width="2"></line>

  <!-- LEFT PANEL -->

  <text x="250" y="90" text-anchor="middle" class="heading">
    Without Feedback
  </text>

  <!-- Player -->
  <circle cx="130" cy="180" r="18" class="player"></circle>
  <line x1="130" y1="198" x2="130" y2="260" class="player"></line>
  <line x1="130" y1="220" x2="100" y2="240" class="player"></line>
  <line x1="130" y1="220" x2="160" y2="240" class="player"></line>
  <line x1="130" y1="260" x2="105" y2="300" class="player"></line>
  <line x1="130" y1="260" x2="155" y2="300" class="player"></line>

  <!-- Basket facing player -->
  <line x1="430" y1="130" x2="430" y2="270" class="basket"></line>
  <line x1="430" y1="190" x2="390" y2="190" class="basket"></line>
  <ellipse cx="390" cy="190" rx="20" ry="8" class="basket"></ellipse>

  <!-- Ball path -->
  <path d="M170 220 Q250 120 330 170" class="path"></path>

  <circle cx="210" cy="180" r="9" class="ball"></circle>
  <circle cx="280" cy="150" r="9" class="ball"></circle>
  <circle cx="350" cy="170" r="9" class="ball"></circle>

  <!-- Miss -->
  <circle cx="340" cy="230" r="9" class="ball"></circle>

  <text x="390" y="280" text-anchor="middle" class="heading">✗ Missed</text>

  <text x="250" y="370" text-anchor="middle" class="text">
    The player knows the shot failed
  </text>

  <text x="250" y="400" text-anchor="middle" class="text">
    but does not know why.
  </text>

  <text x="250" y="470" text-anchor="middle" class="heading">
    What should change?
  </text>

  <text x="250" y="510" text-anchor="middle" class="small">
    Aim?
  </text>

  <text x="250" y="535" text-anchor="middle" class="small">
    Force?
  </text>

  <text x="250" y="560" text-anchor="middle" class="small">
    Angle?
  </text>

  <!-- RIGHT PANEL -->

  <text x="750" y="90" text-anchor="middle" class="heading">
    With Feedback
  </text>

  <!-- Player -->
  <circle cx="620" cy="180" r="18" class="player"></circle>
  <line x1="620" y1="198" x2="620" y2="260" class="player"></line>
  <line x1="620" y1="220" x2="590" y2="240" class="player"></line>
  <line x1="620" y1="220" x2="650" y2="240" class="player"></line>
  <line x1="620" y1="260" x2="595" y2="300" class="player"></line>
  <line x1="620" y1="260" x2="645" y2="300" class="player"></line>

  <!-- Basket facing player -->
  <line x1="920" y1="130" x2="920" y2="270" class="basket"></line>
  <line x1="920" y1="190" x2="880" y2="190" class="basket"></line>
  <ellipse cx="880" cy="190" rx="20" ry="8" class="basket"></ellipse>

  <!-- Improved trajectory -->
  <path d="M660 220 Q760 90 865 180" class="path"></path>

  <circle cx="700" cy="175" r="9" class="ball"></circle>
  <circle cx="770" cy="135" r="9" class="ball"></circle>
  <circle cx="840" cy="165" r="9" class="ball"></circle>

  <!-- Ball entering hoop -->
  <circle cx="875" cy="190" r="9" class="ball"></circle>

  <!-- Feedback box -->
  <rect x="620" y="360" width="260" height="95" rx="10" ry="10" class="feedback"></rect>

  <text x="750" y="392" text-anchor="middle" class="text">
    Feedback:
  </text>

  <text x="750" y="420" text-anchor="middle" class="text">
    Shot missed left.
  </text>

  <text x="750" y="446" text-anchor="middle" class="text">
    Aim slightly right next time.
  </text>

  <path d="M750 470 L750 530" class="arrow"></path>

  <text x="750" y="575" text-anchor="middle" class="heading">
    Better Shot Next Time
  </text>

</svg>