</marker>
</defs>

<rect x="425" y="280" width="250" height="90" class="box"></rect>
<text x="550" y="335" class="txt">AI Agent</text>

<rect x="100" y="120" width="220" height="80" class="box"></rect>
<text x="210" y="165" class="txt">Reasoning</text>

<rect x="780" y="120" width="220" height="80" class="box"></rect>
<text x="890" y="165" class="txt">Memory</text>

<rect x="100" y="500" width="220" height="80" class="box"></rect>
<text x="210" y="545" class="txt">Tools</text>

<rect x="780" y="500" width="220" height="80" class="box"></rect>
<text x="890" y="545" class="txt">Actions</text>

<line x1="320" y1="200" x2="470" y2="280" class="arrow"></line>
<line x1="780" y1="200" x2="630" y2="280" class="arrow"></line>
<line x1="320" y1="500" x2="470" y2="370" class="arrow"></line>
