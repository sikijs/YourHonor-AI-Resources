<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg">

  <rect width="900" height="520" fill="white"></rect>

  <text x="450" y="50" text-anchor="middle" font-size="28" font-family="Arial" font-weight="bold">
    Where Multimodal AI Fails
  </text>

  <!-- Image misinterpretation -->
  <rect x="80" y="120" width="220" height="100" fill="#f8d7da" stroke="#721c24"></rect>
  <text x="190" y="165" text-anchor="middle" font-size="18">
    Misreading Images
  </text>

  <!-- Cross-modal confusion -->
  <rect x="340" y="120" width="220" height="100" fill="#fff3cd" stroke="#856404"></rect>
  <text x="450" y="165" text-anchor="middle" font-size="18">
    Cross-Modal Confusion
  </text>

  <!-- Hallucination -->
  <rect x="600" y="120" width="220" height="100" fill="#f8d7da" stroke="#721c24"></rect>
  <text x="710" y="165" text-anchor="middle" font-size="18">
    Hallucination
  </text>

  <!-- Context errors -->
  <rect x="200" y="300" width="500" height="120" fill="#e2e3e5" stroke="#6c757d"></rect>
  <text x="450" y="360" text-anchor="middle" font-size="20">
    Incorrect Context Interpretation
  </text>

  <!-- arrows -->
  <line x1="190" y1="220" x2="250" y2="300" stroke="#333" stroke-width="2"></line>
  <line x1="450" y1="220" x2="450" y2="300" stroke="#333" stroke-width="2"></line>
  <line x1="710" y1="220" x2="650" y2="300" stroke="#333" stroke-width="2"></line>

</svg>