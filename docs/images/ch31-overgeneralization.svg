<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30" font-family="Arial">
    Overgeneralization Failure
  </text>

  <!-- Core rule -->
  <rect x="420" y="200" width="160" height="120" rx="12" fill="#111827" stroke="#22c55e"></rect>
  <text x="455" y="245" fill="#22c55e" font-size="14">Valid Rule</text>
  <text x="435" y="270" fill="#cbd5e1" font-size="12">Applies in context A</text>

  <!-- Expansion arrows -->
  <line x1="420" y1="240" x2="200" y2="140" stroke="#facc15" stroke-width="3"></line>
  <line x1="580" y1="240" x2="800" y2="140" stroke="#facc15" stroke-width="3"></line>
  <line x1="420" y1="280" x2="200" y2="360" stroke="#facc15" stroke-width="3"></line>
  <line x1="580" y1="280" x2="800" y2="360" stroke="#facc15" stroke-width="3"></line>

  <!-- Incorrect expansions -->
  <rect x="120" y="100" width="200" height="120" rx="12" fill="#111827" stroke="#ef4444"></rect>
  <text x="140" y="150" fill="#ef4444" font-size="13">Wrong Domain</text>
  <text x="140" y="175" fill="#cbd5e1" font-size="12">Applied globally</text>

  <rect x="680" y="100" width="200" height="120" rx="12" fill="#111827" stroke="#ef4444"></rect>
  <text x="700" y="150" fill="#ef4444" font-size="13">Wrong Jurisdiction</text>

  <rect x="120" y="340" width="200" height="120" rx="12" fill="#111827" stroke="#ef4444"></rect>
  <text x="140" y="390" fill="#ef4444" font-size="13">Overextended Rule</text>

  <rect x="680" y="340" width="200" height="120" rx="12" fill="#111827" stroke="#ef4444"></rect>
  <text x="700" y="390" fill="#ef4444" font-size="13">Misapplied Principle</text>

</svg>