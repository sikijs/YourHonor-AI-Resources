<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30" font-family="Arial">
    Retrieval-Augmented Generation (RAG)
  </text>

  <!-- Steps -->
  <rect x="60" y="140" width="180" height="120" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="90" y="200" fill="#38bdf8">Question</text>

  <rect x="280" y="140" width="180" height="120" rx="12" fill="#111827" stroke="#facc15"></rect>
  <text x="320" y="200" fill="#facc15">Search</text>

  <rect x="500" y="140" width="220" height="120" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="520" y="200" fill="#38bdf8">Relevant Docs</text>

  <rect x="760" y="140" width="180" height="120" rx="12" fill="#111827" stroke="#22c55e"></rect>
  <text x="800" y="200" fill="#22c55e">Answer</text>

  <!-- Flow arrows -->
  <line x1="240" y1="200" x2="280" y2="200" stroke="#facc15" stroke-width="3"></line>
  <line x1="460" y1="200" x2="500" y2="200" stroke="#facc15" stroke-width="3"></line>
  <line x1="720" y1="200" x2="760" y2="200" stroke="#facc15" stroke-width="3"></line>

  <!-- Grounding note -->
  <text x="60" y="340" fill="#94a3b8" font-size="18">
    Key shift: from “generate from memory” → “generate from retrieved evidence”
  </text>

</svg>