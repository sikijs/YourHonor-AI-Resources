<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420">
  <rect width="100%" height="100%" fill="#0f172a"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="28">Generation vs Retrieval</text>

  <rect x="80" y="120" width="300" height="180" fill="#1e293b" stroke="#38bdf8"></rect>
  <text x="120" y="160" fill="#ffffff">Retrieval System</text>
  <text x="110" y="210" fill="#94a3b8">Searches database</text>
  <text x="110" y="240" fill="#94a3b8">Returns stored facts</text>

  <rect x="520" y="120" width="300" height="180" fill="#1e293b" stroke="#a855f7"></rect>
  <text x="560" y="160" fill="#ffffff">Generative Model</text>
  <text x="550" y="210" fill="#94a3b8">Predicts next tokens</text>
  <text x="550" y="240" fill="#94a3b8">Creates likely text</text>

  <path d="M380 210 L520 210" stroke="#facc15" stroke-width="4"></path>
  <text x="400" y="190" fill="#facc15">Different Mechanism</text>
