<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="420" fill="#ffffff"></rect>

  <text x="500" y="40" text-anchor="middle" font-size="18">The Evolution of Modern AI Systems</text>

  <!-- stages -->
  <rect x="100" y="140" width="220" height="120" rx="12" fill="#f5f5f5" stroke="#333"></rect>
  <text x="210" y="180" text-anchor="middle">Language Models</text>
  <text x="210" y="210" text-anchor="middle" font-size="12">Pattern prediction</text>

  <rect x="390" y="140" width="220" height="120" rx="12" fill="#e8f4ff" stroke="#333"></rect>
  <text x="500" y="180" text-anchor="middle">RAG Systems</text>
  <text x="500" y="210" text-anchor="middle" font-size="12">Grounded answers</text>

  <rect x="680" y="140" width="220" height="120" rx="12" fill="#fff4e6" stroke="#333"></rect>
  <text x="790" y="180" text-anchor="middle">Agent Systems</text>
  <text x="790" y="210" text-anchor="middle" font-size="12">Planning + tools</text>

  <!-- arrows -->
  <line x1="320" y1="200" x2="390" y2="200" stroke="#333"></line>
  <line x1="610" y1="200" x2="680" y2="200" stroke="#333"></line>

  <text x="500" y="330" text-anchor="middle" font-size="12">
    Increasing structure, autonomy, and interaction with the external world
  </text>
</svg>