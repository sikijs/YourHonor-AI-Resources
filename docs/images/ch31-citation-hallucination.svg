<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30">Citation Hallucination</text>

  <!-- Claim -->
  <rect x="80" y="140" width="360" height="300" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="110" y="190" fill="#38bdf8">Legal Claim</text>
  <text x="110" y="230" fill="#e2e8f0">“Court held X applies”</text>

  <!-- Fake citation -->
  <rect x="560" y="140" width="360" height="300" rx="12" fill="#111827" stroke="#ef4444"></rect>
  <text x="590" y="190" fill="#ef4444">Citation Layer</text>
  <text x="590" y="230" fill="#e2e8f0">Smith v. Doe, 2015</text>
  <text x="590" y="260" fill="#e2e8f0">p. 442 (does not exist)</text>

  <!-- Warning -->
  <text x="590" y="320" fill="#ef4444">⚠ Authority illusion</text>

  <line x1="440" y1="290" x2="560" y2="290" stroke="#facc15" stroke-width="4"></line>
</svg>