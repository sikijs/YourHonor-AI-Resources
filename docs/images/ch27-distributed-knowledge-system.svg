<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="420" fill="#ffffff"></rect>

  <text x="500" y="40" text-anchor="middle" font-size="18">Where Knowledge Lives in Modern AI Systems</text>

  <!-- Model -->
  <rect x="420" y="150" width="160" height="120" rx="12" fill="#f5f5f5" stroke="#333"></rect>
  <text x="500" y="190" text-anchor="middle" font-size="14">LLM</text>
  <text x="500" y="220" text-anchor="middle" font-size="12">Reasoning</text>

  <!-- Data sources -->
  <rect x="100" y="120" width="220" height="100" rx="12" fill="#e8f4ff" stroke="#333"></rect>
  <text x="210" y="165" text-anchor="middle">Databases</text>

  <rect x="100" y="240" width="220" height="100" rx="12" fill="#f0fff4" stroke="#333"></rect>
  <text x="210" y="285" text-anchor="middle">Documents</text>

  <rect x="680" y="120" width="220" height="100" rx="12" fill="#fff4e6" stroke="#333"></rect>
  <text x="790" y="165" text-anchor="middle">Web / APIs</text>

  <rect x="680" y="240" width="220" height="100" rx="12" fill="#dff6ff" stroke="#333"></rect>
  <text x="790" y="285" text-anchor="middle">External Tools</text>

  <!-- Arrows -->
  <line x1="320" y1="170" x2="420" y2="190" stroke="#333"></line>
  <line x1="320" y1="290" x2="420" y2="230" stroke="#333"></line>
  <line x1="580" y1="190" x2="680" y2="170" stroke="#333"></line>
  <line x1="580" y1="230" x2="680" y2="290" stroke="#333"></line>

  <text x="500" y="370" text-anchor="middle" font-size="12">
    Knowledge is distributed, not stored in one place
  </text>
</svg>