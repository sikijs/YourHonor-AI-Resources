<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="420" fill="#ffffff"></rect>

  <text x="500" y="40" text-anchor="middle" font-size="18">Why RAG Improves Reliability</text>

  <!-- Left side -->
  <rect x="120" y="120" width="300" height="220" rx="12" fill="#f5f5f5" stroke="#333"></rect>
  <text x="270" y="150" text-anchor="middle" font-size="14">Without RAG</text>

  <text x="270" y="190" text-anchor="middle" font-size="12">Internal patterns only</text>
  <text x="270" y="220" text-anchor="middle" font-size="12">No verification step</text>
  <text x="270" y="250" text-anchor="middle" font-size="12">Possible hallucinations</text>

  <!-- Right side -->
  <rect x="580" y="120" width="300" height="220" rx="12" fill="#f0fff4" stroke="#333"></rect>
  <text x="730" y="150" text-anchor="middle" font-size="14">With RAG</text>

  <text x="730" y="190" text-anchor="middle" font-size="12">External documents retrieved</text>
  <text x="730" y="220" text-anchor="middle" font-size="12">Context grounded answers</text>
  <text x="730" y="250" text-anchor="middle" font-size="12">Traceable reasoning</text>

  <!-- Divider -->
  <line x1="500" y1="120" x2="500" y2="340" stroke="#ccc"></line>
</svg>