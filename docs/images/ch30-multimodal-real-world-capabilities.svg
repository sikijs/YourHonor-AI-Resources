<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg">

  <rect width="900" height="520" fill="white"></rect>

  <text x="450" y="50" text-anchor="middle" font-size="28" font-family="Arial" font-weight="bold">
    Multimodal AI in the Real World
  </text>

  <!-- Inputs -->
  <rect x="80" y="120" width="180" height="80" fill="#f5f5f5" stroke="#444"></rect>
  <text x="170" y="165" text-anchor="middle" font-size="20">Image</text>

  <rect x="80" y="220" width="180" height="80" fill="#f5f5f5" stroke="#444"></rect>
  <text x="170" y="265" text-anchor="middle" font-size="20">Text</text>

  <rect x="80" y="320" width="180" height="80" fill="#f5f5f5" stroke="#444"></rect>
  <text x="170" y="365" text-anchor="middle" font-size="20">Audio</text>

  <rect x="80" y="420" width="180" height="80" fill="#f5f5f5" stroke="#444"></rect>
  <text x="170" y="465" text-anchor="middle" font-size="20">Video</text>

  <!-- Core model -->
  <rect x="330" y="200" width="200" height="140" fill="#e8f4ff" stroke="#2c5aa0"></rect>
  <text x="430" y="260" text-anchor="middle" font-size="20" font-weight="bold">
    Multimodal
  </text>
  <text x="430" y="290" text-anchor="middle" font-size="16">
    AI System
  </text>

  <!-- Tools layer -->
  <rect x="600" y="120" width="240" height="380" fill="#fff3cd" stroke="#b58900"></rect>
  <text x="720" y="150" text-anchor="middle" font-size="18" font-weight="bold">
    Tools &amp; Actions
  </text>

  <text x="720" y="200" text-anchor="middle" font-size="16">Search</text>
  <text x="720" y="240" text-anchor="middle" font-size="16">Summarize</text>
  <text x="720" y="280" text-anchor="middle" font-size="16">Extract Data</text>
  <text x="720" y="320" text-anchor="middle" font-size="16">Send Messages</text>
  <text x="720" y="360" text-anchor="middle" font-size="16">Schedule</text>
  <text x="720" y="400" text-anchor="middle" font-size="16">Analyze Media</text>

  <!-- Arrows into model -->
  <line x1="260" y1="160" x2="330" y2="240" stroke="#333" stroke-width="2"></line>
  <line x1="260" y1="260" x2="330" y2="260" stroke="#333" stroke-width="2"></line>
  <line x1="260" y1="360" x2="330" y2="280" stroke="#333" stroke-width="2"></line>
  <line x1="260" y1="460" x2="330" y2="300" stroke="#333" stroke-width="2"></line>

  <!-- Arrow to tools -->
  <line x1="530" y1="270" x2="600" y2="270" stroke="#333" stroke-width="2"></line>

</svg>