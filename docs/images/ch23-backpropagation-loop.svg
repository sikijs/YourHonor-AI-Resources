<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font: bold 28px Arial, sans-serif; fill: #222; }
.box { fill: #ffffff; stroke: #444; stroke-width: 2; rx: 12; ry: 12; }
.step { font: 20px Arial, sans-serif; fill: #333; }
.small { font: 16px Arial, sans-serif; fill: #555; }
.arrow { stroke: #666; stroke-width: 3; fill: none; marker-end: url(#arrow); }
.loop { stroke: #888; stroke-width: 2.5; fill: none; stroke-dasharray: 6 4; }
.center { fill: #f5f5f5; stroke: #333; stroke-width: 2; rx: 14; ry: 14; }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0,10 3,0 6" fill="#666"></polygon>
</marker>
</defs>

<text x="500" y="40" text-anchor="middle" class="title">
Backpropagation Learning Loop
</text>

<!-- Center AI Model -->
<rect x="350" y="260" width="300" height="160" class="center"></rect>
<text x="500" y="320" text-anchor="middle" class="step">Neural Network</text>
<text x="500" y="355" text-anchor="middle" class="small">Makes Predictions</text>

<!-- Steps around loop -->

<!-- Data -->
<rect x="120" y="120" width="220" height="80" class="box"></rect>
<text x="230" y="170" text-anchor="middle" class="step">Data Input</text>

<!-- Prediction -->
<rect x="700" y="120" width="220" height="80" class="box"></rect>
<text x="810" y="170" text-anchor="middle" class="step">Prediction</text>

<!-- Error -->
<rect x="760" y="420" width="200" height="80" class="box"></rect>
<text x="860" y="470" text-anchor="middle" class="step">Error Calculated</text>

<!-- Backprop -->
<rect x="120" y="420" width="240" height="80" class="box"></rect>
<text x="240" y="460" text-anchor="middle" class="step">Backpropagation</text>

<!-- Weight Update -->
<rect x="410" y="560" width="240" height="80" class="box"></rect>
<text x="530" y="600" text-anchor="middle" class="step">Weights Updated</text>

<!-- Arrows -->

<line x1="340" y1="160" x2="350" y2="300" class="arrow"></line>
<line x1="650" y1="300" x2="700" y2="160" class="arrow"></line>
<line x1="810" y1="200" x2="840" y2="420" class="arrow"></line>
<line x1="760" y1="460" x2="360" y2="460" class="arrow"></line>
<line x1="240" y1="420" x2="420" y2="560" class="arrow"></line>
<line x1="530" y1="560" x2="500" y2="420" class="arrow"></line>

<!-- Loop label -->
<path d="M500 100 C650 100, 650 500, 500 600 C350 500, 350 100, 500 100" class="loop"></path>

<text x="500" y="80" text-anchor="middle" class="small">
Continuous feedback cycle
</text>

</svg>