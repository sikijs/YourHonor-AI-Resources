<svg width="1000" height="500" xmlns="http://www.w3.org/2000/svg">

<rect width="100%" height="100%" fill="white"></rect>

<text x="500" y="50" text-anchor="middle" font-size="28" font-family="Arial" font-weight="bold">
Confidence Does Not Guarantee Correctness
</text>

<circle cx="300" cy="250" r="120" fill="#eef4ff" stroke="#3366cc" stroke-width="3"></circle>

<text x="300" y="245" text-anchor="middle" font-size="24" font-weight="bold">
Looks Correct
</text>

<text x="300" y="280" text-anchor="middle" font-size="18">
Professional Output
</text>

<circle cx="700" cy="250" r="120" fill="#eefcf0" stroke="#2e8b57" stroke-width="3"></circle>

<text x="700" y="245" text-anchor="middle" font-size="24" font-weight="bold">
Actually Correct
</text>

<text x="700" y="280" text-anchor="middle" font-size="18">
Verified Result
</text>

<text x="500" y="430" text-anchor="middle" font-size="18">
The human must determine whether the AI's answer is truly correct.
</text>

</svg>