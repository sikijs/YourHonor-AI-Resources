<!--?xml version="1.0" encoding="UTF-8"?-->
<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 30px;
        font-weight: bold;
        text-anchor: middle;
      }

      .axis {
        stroke: #333;
        stroke-width: 3;
      }

      .grid {
        stroke: #dddddd;
        stroke-width: 1;
      }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
      }

      .word {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 20px;
        font-weight: bold;
      }

      .caption {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: bold;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="50" class="title">
    Words as Coordinates in Meaning Space
  </text>

  <!-- Grid -->
  <g>
    <line x1="120" y1="550" x2="700" y2="550" class="grid"></line>
    <line x1="120" y1="470" x2="700" y2="470" class="grid"></line>
    <line x1="120" y1="390" x2="700" y2="390" class="grid"></line>
    <line x1="120" y1="310" x2="700" y2="310" class="grid"></line>
    <line x1="120" y1="230" x2="700" y2="230" class="grid"></line>
    <line x1="120" y1="150" x2="700" y2="150" class="grid"></line>

    <line x1="120" y1="150" x2="120" y2="550" class="grid"></line>
    <line x1="220" y1="150" x2="220" y2="550" class="grid"></line>
    <line x1="320" y1="150" x2="320" y2="550" class="grid"></line>
    <line x1="420" y1="150" x2="420" y2="550" class="grid"></line>
    <line x1="520" y1="150" x2="520" y2="550" class="grid"></line>
    <line x1="620" y1="150" x2="620" y2="550" class="grid"></line>
  </g>

  <!-- Axes -->
  <line x1="120" y1="580" x2="750" y2="580" class="axis"></line>
  <line x1="120" y1="580" x2="120" y2="100" class="axis"></line>

  <!-- Arrowheads -->
  <polygon points="750,580 735,572 735,588" fill="#333"></polygon>
  <polygon points="120,100 112,115 128,115" fill="#333"></polygon>

  <!-- Axis Labels -->
  <text x="760" y="586" class="label">Dimension 1</text>

  <text x="55" y="350" transform="rotate(-90 55 350)" class="label">
    Dimension 2
  </text>

  <!-- Cat -->
  <circle cx="320" cy="340" r="8" fill="#333"></circle>
  <text x="335" y="345" class="word">Cat (2,3)</text>

  <!-- Dog -->
  <circle cx="420" cy="260" r="8" fill="#333"></circle>
  <text x="435" y="265" class="word">Dog (3,4)</text>

  <!-- Puppy -->
  <circle cx="420" cy="180" r="8" fill="#333"></circle>
  <text x="435" y="185" class="word">Puppy (3,5)</text>

  <!-- Connecting lines -->
  <line x1="320" y1="340" x2="420" y2="260" stroke="#666" stroke-width="2"></line>
  <line x1="420" y1="260" x2="420" y2="180" stroke="#666" stroke-width="2"></line>

  <!-- Airplane -->
  <circle cx="820" cy="160" r="8" fill="#333"></circle>
  <text x="840" y="165" class="word">Airplane (18,20)</text>

  <!-- Dashed separation line -->
  <line x1="700" y1="120" x2="700" y2="550" stroke="#999" stroke-width="2" stroke-dasharray="8,8"></line>

  <!-- Explanations -->
  <text x="810" y="300" class="label">
    Far Away
  </text>

  <text x="810" y="330" class="label">
    Different Meaning
  </text>

  <text x="300" y="620" class="label">
    Nearby Points → Similar Meanings
  </text>

  <!-- Bottom Caption -->
  <text x="500" y="675" class="caption">
    Distance Represents Similarity
  </text>

</svg>