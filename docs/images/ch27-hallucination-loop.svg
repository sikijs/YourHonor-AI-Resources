  <text x="450" y="40" text-anchor="middle" font-size="20">Why Hallucination Happens</text>

  <!-- Flow -->
  <rect x="80" y="160" width="160" height="70" fill="#f5f5f5" stroke="#333"></rect>
  <text x="160" y="200" text-anchor="middle">User Question</text>

  <rect x="300" y="160" width="180" height="70" fill="#f5f5f5" stroke="#333"></rect>
  <text x="390" y="200" text-anchor="middle">Pattern Matching</text>

  <rect x="540" y="160" width="200" height="70" fill="#f5f5f5" stroke="#333"></rect>
  <text x="640" y="200" text-anchor="middle">Fluent Guessing</text>

  <rect x="300" y="280" width="240" height="70" fill="#ffe5e5" stroke="#aa0000"></rect>
  <text x="420" y="320" text-anchor="middle">Confident but Wrong Answer</text>

  <!-- Arrows -->
  <line x1="240" y1="195" x2="300" y2="195" stroke="#333"></line>
  <line x1="480" y1="195" x2="540" y2="195" stroke="#333"></line>
