<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font: bold 28px Arial, sans-serif; fill: #222; }
.text { font: 18px Arial, sans-serif; fill: #333; }
.small { font: 16px Arial, sans-serif; fill: #555; }
.box { fill: #ffffff; stroke: #444; stroke-width: 2; rx: 12; ry: 12; }
.center { fill: #f5f5f5; stroke: #333; stroke-width: 2; rx: 14; ry: 14; }
.arrow { stroke: #666; stroke-width: 3; fill: none; marker-end: url(#arrow); }
.loop { stroke: #aaa; stroke-width: 2.5; fill: none; stroke-dasharray: 6 5; }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0,10 3,0 6" fill="#666"></polygon>
</marker>
</defs>

<text x="500" y="40" text-anchor="middle" class="title">
How Backpropagation Creates Modern AI
</text>

<!-- center system -->
<rect x="330" y="240" width="340" height="170" class="center"></rect>
<text x="500" y="300" text-anchor="middle" class="text">Neural Network</text>
<text x="500" y="335" text-anchor="middle" class="small">Learns from data using feedback</text>

<!-- surrounding steps -->

<rect x="120" y="120" width="220" height="80" class="box"></rect>
<text x="230" y="170" text-anchor="middle" class="text">Data</text>

<rect x="660" y="120" width="220" height="80" class="box"></rect>
<text x="770" y="170" text-anchor="middle" class="text">Prediction</text>

<rect x="760" y="420" width="200" height="80" class="box"></rect>
<text x="860" y="470" text-anchor="middle" class="text">Error</text>

<rect x="120" y="420" width="240" height="80" class="box"></rect>
<text x="240" y="470" text-anchor="middle" class="text">Backpropagation</text>

<rect x="410" y="550" width="240" height="80" class="box"></rect>
<text x="530" y="595" text-anchor="middle" class="text">Weight Updates</text>

<!-- arrows -->
<line x1="340" y1="160" x2="420" y2="290" class="arrow"></line>
<line x1="670" y1="290" x2="660" y2="160" class="arrow"></line>
<line x1="770" y1="200" x2="860" y2="420" class="arrow"></line>
<line x1="760" y1="460" x2="360" y2="460" class="arrow"></line>
<line x1="240" y1="420" x2="420" y2="550" class="arrow"></line>
<line x1="530" y1="550" x2="500" y2="410" class="arrow"></line>

<!-- outer loop -->
<path d="M500 90 C700 90, 900 250, 860 500 C800 620, 200 620, 140 500 C100 250, 300 90, 500 90" class="loop"></path>

<text x="500" y="610" text-anchor="middle" class="small">
Continuous learning cycle at scale
</text>

</svg>