  </text>

  <!-- Connections -->
  <line x1="380" y1="220" x2="270" y2="140" stroke="#888"></line>
  <line x1="620" y1="220" x2="730" y2="140" stroke="#888"></line>
  <line x1="380" y1="260" x2="270" y2="370" stroke="#888"></line>
  <line x1="620" y1="260" x2="730" y2="370" stroke="#888"></line>
  <line x1="500" y1="290" x2="500" y2="430" stroke="#888"></line>
