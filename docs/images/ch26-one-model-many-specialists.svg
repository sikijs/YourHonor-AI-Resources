<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <rect width="1000" height="520" fill="white"></rect>

  <text x="500" y="50" text-anchor="middle" font-family="Georgia" font-size="24" fill="#111">
    One Foundation Model, Many Specialists
  </text>

  <!-- Center -->
  <rect x="380" y="190" width="240" height="100" rx="12" fill="#eef6ff" stroke="#cfe0f5"></rect>

  <text x="500" y="245" text-anchor="middle" font-family="Georgia" font-size="18">
    Foundation Model
  </text>

  <!-- Legal -->
  <rect x="90" y="80" width="180" height="70" rx="10" fill="#fafafa" stroke="#d9d9d9"></rect>
  <text x="180" y="122" text-anchor="middle" font-family="Georgia" font-size="15">
    Legal AI
  </text>

  <!-- Medical -->
  <rect x="730" y="80" width="180" height="70" rx="10" fill="#fafafa" stroke="#d9d9d9"></rect>
  <text x="820" y="122" text-anchor="middle" font-family="Georgia" font-size="15">
    Medical AI
  </text>

  <!-- Finance -->
  <rect x="90" y="370" width="180" height="70" rx="10" fill="#fafafa" stroke="#d9d9d9"></rect>
  <text x="180" y="412" text-anchor="middle" font-family="Georgia" font-size="15">
    Financial AI
  </text>

  <!-- Support -->
  <rect x="730" y="370" width="180" height="70" rx="10" fill="#fafafa" stroke="#d9d9d9"></rect>
