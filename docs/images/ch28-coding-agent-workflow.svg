<svg width="1200" height="500" xmlns="http://www.w3.org/2000/svg">
<style>
.box{fill:#f7f9fc;stroke:#2b3a55;stroke-width:2}
.txt{font-family:Arial;font-size:18px;text-anchor:middle}
.arrow{stroke:#2b3a55;stroke-width:2;marker-end:url(#a)}
</style>

<defs>
<marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0,10 3.5,0 7" fill="#2b3a55"></polygon>
</marker>
</defs>

<rect x="450" y="40" width="220" height="70" class="box"></rect>
<text x="560" y="80" class="txt">Read Codebase</text>

<rect x="450" y="160" width="220" height="70" class="box"></rect>
<text x="560" y="200" class="txt">Write Code</text>

<rect x="450" y="280" width="220" height="70" class="box"></rect>
<text x="560" y="320" class="txt">Run Tests</text>

<rect x="450" y="400" width="220" height="70" class="box"></rect>
<text x="560" y="440" class="txt">Fix Issues</text>

<line x1="560" y1="110" x2="560" y2="160" class="arrow"></line>
<line x1="560" y1="230" x2="560" y2="280" class="arrow"></line>
<line x1="560" y1="350" x2="560" y2="400" class="arrow"></line>
</svg>