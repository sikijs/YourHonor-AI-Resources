<svg width="1100" height="650" viewBox="0 0 1100 650" xmlns="http://www.w3.org/2000/svg">

  <style>
    .box { fill:#f7f9fc; stroke:#2b3a55; stroke-width:2; rx:12; }
    .title { font:bold 20px sans-serif; fill:#1c2b3a; }
    .text { font:16px sans-serif; fill:#1c2b3a; }
    .small { font:14px sans-serif; fill:#3a4a5a; }
    .arrow { stroke:#2b3a55; stroke-width:2; marker-end:url(#arrowhead); fill:none; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b3a55"></polygon>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="400" y="40" width="300" height="60" class="box"></rect>
  <text x="500" y="76" class="title">Input Data</text>

  <!-- Prediction -->
  <rect x="400" y="140" width="300" height="60" class="box"></rect>
  <text x="460" y="176" class="title">AI Makes Prediction</text>

  <!-- Compare -->
  <rect x="370" y="240" width="360" height="60" class="box"></rect>
  <text x="420" y="276" class="title">Compare with Correct Answer</text>

  <!-- Loss -->
  <rect x="400" y="340" width="300" height="60" class="box"></rect>
  <text x="490" y="376" class="title">Compute Loss</text>

  <!-- Feedback -->
  <rect x="400" y="440" width="300" height="60" class="box"></rect>
  <text x="485" y="476" class="title">Feedback Signal</text>

  <!-- Update -->
  <rect x="400" y="540" width="300" height="60" class="box"></rect>
  <text x="455" y="576" class="title">Adjust Model Weights</text>

  <!-- Main Flow -->
  <line x1="550" y1="100" x2="550" y2="140" class="arrow"></line>
  <line x1="550" y1="200" x2="550" y2="240" class="arrow"></line>
  <line x1="550" y1="300" x2="550" y2="340" class="arrow"></line>
  <line x1="550" y1="400" x2="550" y2="440" class="arrow"></line>
  <line x1="550" y1="500" x2="550" y2="540" class="arrow"></line>

  <!-- Loop Back -->
  <path d="M 720 570 C 930 570, 930 170, 720 170" class="arrow"></path>

  <!-- Annotation -->
  <text x="785" y="350" class="small">Learning Loop</text>
  <text x="760" y="375" class="small">Error drives improvement</text>

</svg>