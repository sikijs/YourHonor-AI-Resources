<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
<rect width="1200" height="800" fill="white"/>
<text x="600" y="55" text-anchor="middle" font-size="30" font-family="Arial" font-weight="bold">The Boundary of AI Understanding</text>

<rect x="80" y="110" width="420" height="220" fill="white" stroke="black" stroke-width="2"/>
<text x="290" y="145" text-anchor="middle" font-size="24" font-family="Arial" font-weight="bold">Human Reasoning</text>
<line x1="80" y1="160" x2="500" y2="160" stroke="black"/>
<text x="120" y="200" font-size="20">• Meaning</text>
<text x="120" y="235" font-size="20">• Intent</text>
<text x="120" y="270" font-size="20">• Context</text>
<text x="120" y="305" font-size="20">• Contradictions</text>

<rect x="700" y="110" width="420" height="220" fill="white" stroke="black" stroke-width="2"/>
<text x="910" y="145" text-anchor="middle" font-size="24" font-family="Arial" font-weight="bold">AI Processing</text>
<line x1="700" y1="160" x2="1120" y2="160" stroke="black"/>
<text x="740" y="200" font-size="20">• Patterns</text>
<text x="740" y="235" font-size="20">• Probabilities</text>
<text x="740" y="270" font-size="20">• Tokens</text>
<text x="740" y="305" font-size="20">• Prediction</text>

<text x="600" y="400" text-anchor="middle" font-size="22">Same Contract / Same Document</text>
<line x1="600" y1="350" x2="600" y2="430" stroke="black" stroke-width="2"/>

<rect x="180" y="470" width="280" height="140" fill="white" stroke="black"/>
<text x="320" y="505" text-anchor="middle" font-size="22" font-weight="bold">Human Lawyer</text>
<text x="210" y="545" font-size="18">Detects conflict</text>
<text x="210" y="575" font-size="18">Questions assumptions</text>

<rect x="740" y="470" width="280" height="140" fill="white" stroke="black"/>
<text x="880" y="505" text-anchor="middle" font-size="22" font-weight="bold">AI System</text>
<text x="770" y="545" font-size="18">Produces summary</text>
<text x="770" y="575" font-size="18">Predicts likely text</text>

<line x1="320" y1="610" x2="320" y2="670" stroke="black" stroke-width="2"/>
<line x1="880" y1="610" x2="880" y2="670" stroke="black" stroke-width="2"/>
<line x1="320" y1="670" x2="880" y2="670" stroke="black" stroke-width="2"/>

<rect x="390" y="690" width="420" height="60" fill="white" stroke="black" stroke-width="3"/>
<text x="600" y="728" text-anchor="middle" font-size="28" font-weight="bold">Confidence ≠ Correctness</text>
</svg>