<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">

  <style>
    .box { fill:#f7f9fc; stroke:#2b3a55; stroke-width:2; rx:12; }
    .text { font-family: Arial, sans-serif; font-size:18px; fill:#1c2430; text-anchor:middle; }
    .arrow { stroke:#2b3a55; stroke-width:2; marker-end:url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b3a55"></polygon>
    </marker>
  </defs>

  <rect x="400" y="40" width="200" height="60" class="box"></rect>
  <text x="500" y="78" class="text">User Goal</text>

  <line x1="500" y1="100" x2="500" y2="160" class="arrow"></line>

  <rect x="400" y="160" width="200" height="60" class="box"></rect>
  <text x="500" y="198" class="text">Break Down Task</text>

  <line x1="500" y1="220" x2="500" y2="280" class="arrow"></line>

  <rect x="400" y="280" width="200" height="60" class="box"></rect>
  <text x="500" y="318" class="text">Use Tools</text>

  <line x1="500" y1="340" x2="500" y2="400" class="arrow"></line>

  <rect x="400" y="400" width="200" height="60" class="box"></rect>
  <text x="500" y="438" class="text">Refine Output</text>

  <line x1="500" y1="460" x2="500" y2="520" class="arrow"></line>

  <rect x="400" y="520" width="200" height="60" class="box"></rect>
  <text x="500" y="558" class="text">Final Result</text>

</svg>