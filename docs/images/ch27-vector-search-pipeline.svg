<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="420" fill="#ffffff"></rect>

  <text x="500" y="40" text-anchor="middle" font-size="18">Vector Database Retrieval Process</text>

  <!-- Query -->
  <rect x="80" y="160" width="200" height="80" rx="12" fill="#f5f5f5" stroke="#333"></rect>
  <text x="180" y="205" text-anchor="middle">User Query</text>

  <!-- Embedding -->
  <rect x="320" y="160" width="200" height="80" rx="12" fill="#fff4e6" stroke="#333"></rect>
  <text x="420" y="195" text-anchor="middle" font-size="14">Embedding Model</text>
  <text x="420" y="215" text-anchor="middle" font-size="12">Query → Vector</text>

  <!-- Vector DB -->
  <rect x="560" y="120" width="360" height="160" rx="12" fill="#e8f4ff" stroke="#333"></rect>
  <text x="740" y="150" text-anchor="middle" font-size="14">Vector Database</text>

  <circle cx="650" cy="200" r="6" fill="#333"></circle>
  <circle cx="700" cy="220" r="6" fill="#333"></circle>
  <circle cx="780" cy="210" r="6" fill="#333"></circle>
  <circle cx="830" cy="240" r="6" fill="#333"></circle>

  <!-- Arrows -->
  <line x1="280" y1="200" x2="320" y2="200" stroke="#333"></line>
  <line x1="520" y1="200" x2="560" y2="200" stroke="#333"></line>

  <text x="740" y="310" text-anchor="middle" font-size="12">Nearest-neighbor similarity search</text>
</svg>