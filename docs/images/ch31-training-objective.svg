<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <rect width="100%" height="100%" fill="#0b1220"></rect>

  <text x="50" y="60" fill="#ffffff" font-size="30" font-family="Arial">
    Training Objective vs Truth
  </text>

  <!-- Left side -->
  <rect x="60" y="120" width="360" height="300" rx="12" fill="#111827" stroke="#38bdf8"></rect>
  <text x="90" y="160" fill="#38bdf8" font-size="20">Training Goal</text>

  <text x="90" y="210" fill="#e2e8f0" font-size="16">Predict next token</text>
  <text x="90" y="240" fill="#e2e8f0" font-size="16">Learn patterns in text</text>
  <text x="90" y="270" fill="#e2e8f0" font-size="16">Optimize fluency</text>

  <!-- Right side -->
  <rect x="580" y="120" width="360" height="300" rx="12" fill="#111827" stroke="#ef4444"></rect>
  <text x="610" y="160" fill="#ef4444" font-size="20">Not Directly Learned</text>

  <text x="610" y="210" fill="#e2e8f0" font-size="16">Truth verification</text>
  <text x="610" y="240" fill="#e2e8f0" font-size="16">Fact checking</text>
  <text x="610" y="270" fill="#e2e8f0" font-size="16">External grounding</text>

  <!-- Arrow -->
  <line x1="430" y1="270" x2="580" y2="270" stroke="#facc15" stroke-width="4"></line>
  <polygon points="580,270 565,260 565,280" fill="#facc15"></polygon>

  <text x="430" y="240" fill="#facc15" font-size="16">Mismatch</text>

</svg>